name: Deploy LLRE EMIS to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:  # allows manual trigger from GitHub UI

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Inject Supabase credentials
        # Generates env-config.js from GitHub Secrets at build time
        # Credentials are NEVER stored in the repo
        run: |
          cat > env-config.js << EOF
          window.ENV_SUPABASE_URL = '${{ secrets.SUPABASE_URL }}';
          window.ENV_SUPABASE_ANON_KEY = '${{ secrets.SUPABASE_ANON_KEY }}';
          EOF
          echo "env-config.js generated successfully"

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload site to Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'   # upload everything in root (index.html + generated env-config.js + logo.png)

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
